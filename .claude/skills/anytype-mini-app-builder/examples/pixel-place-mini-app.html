<script src="./react.js"></script>
<script src="./react-dom.js"></script>
<script src="./useAnytypeState.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-1: #0c0d1b;
    --bg-2: #14152b;
    --surface: rgba(255,255,255,.04);
    --surface-2: rgba(255,255,255,.07);
    --line: rgba(255,255,255,.08);
    --text: #eef0f8;
    --text-dim: #9aa0b8;
    --accent: #7c7cff;
    --accent-2: #6c5ce7;
    --danger: #ff6b6b;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(900px 500px at 80% -10%, #251a44 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 110%, #103047 0%, transparent 55%),
      var(--bg-1);
    color: var(--text); font-family: var(--font);
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  #app, #root { height: 100%; }
  .wrap { display: flex; flex-direction: column; height: 100%; }

  /* ---------- Header ---------- */
  .header {
    flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(28,30,58,.8), rgba(20,21,42,.55));
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
  }
  .logo {
    width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0; overflow: hidden;
    background:
      conic-gradient(from 0deg, #ff5470, #ffd93b, #6ddf6d, #36b3ff, #9b5cff, #ff5470);
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
    box-shadow: 0 4px 16px rgba(124,124,255,.4);
  }
  .logo i { background: rgba(0,0,0,.18); }
  .logo i:nth-child(2),.logo i:nth-child(4),.logo i:nth-child(6),.logo i:nth-child(8){ background: transparent; }
  .htext { flex: 1; min-width: 0; }
  .htext .title { font-size: 16px; font-weight: 800; letter-spacing: .3px; }
  .htext .status { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .htext .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #36d399;
    box-shadow: 0 0 8px #36d399; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  .chip {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--line);
    padding: 6px 11px; border-radius: 999px; font-variant-numeric: tabular-nums;
  }
  .chip b { color: var(--text); }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--text-dim); transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger); }

  /* ---------- Board ---------- */
  .board-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 18px; }
  canvas#board {
    border-radius: 12px;
    box-shadow: 0 0 0 1px var(--line), 0 24px 60px rgba(0,0,0,.55);
    cursor: crosshair; touch-action: none;
  }

  /* ---------- Palette ---------- */
  .palette {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    justify-content: center; padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(20,21,42,.9), rgba(20,21,42,.5));
    backdrop-filter: blur(12px); border-top: 1px solid var(--line);
  }
  .swatch {
    width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
    transition: transform .12s, border-color .12s; position: relative;
  }
  .swatch:hover { transform: translateY(-3px) scale(1.06); }
  .swatch.sel { border-color: #fff; transform: translateY(-3px) scale(1.1);
    box-shadow: 0 4px 12px rgba(0,0,0,.5); }
  .swatch.eraser {
    background:
      linear-gradient(45deg, #3a3f4d 25%, transparent 25%, transparent 75%, #3a3f4d 75%) 0 0/12px 12px,
      linear-gradient(45deg, #3a3f4d 25%, #20232e 25%, #20232e 75%, #3a3f4d 75%) 6px 6px/12px 12px,
      #20232e;
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px;
  }
  .sep { width: 1px; height: 26px; background: var(--line); margin: 0 4px; }
</style>
<div id="app"></div>
<script>
"use strict";
var h = React.createElement;

var GRID = 32;
var PALETTE = [
  "#ffffff","#c5cad6","#7b8194","#3a3f4d","#0a0b14",
  "#ff5470","#ff9f43","#ffd93b","#6ddf6d","#22c4a8",
  "#36b3ff","#4f6dff","#9b5cff","#ff6fd8","#a8632f"
];

var POP_MS = 320, RIPPLE_MS = 480, ANIM_MAX = 480;

function keyOf(x, y) { return x + "," + y; }
function clampi(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function easeOutBack(p) { var c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2); }

/* Reduce the shared op-log into the current board.
   {t:"set", x, y, c, id} paints a cell (c === null erases it); {t:"clear"} wipes. */
function buildGrid(ops) {
  var g = new Map();
  (ops || []).forEach(function (op) {
    if (op.t === "clear") { g.clear(); }
    else if (op.t === "set" && typeof op.x === "number" && typeof op.y === "number") {
      var k = keyOf(op.x, op.y);
      if (op.c == null) g.delete(k);
      else g.set(k, { c: op.c, id: op.id, x: op.x, y: op.y });
    }
  });
  return g;
}

function TrashIcon() {
  return h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none",
      stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
    h("path", { d: "M3 6h18" }),
    h("path", { d: "M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" }),
    h("path", { d: "M19 6v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6" }),
    h("path", { d: "M10 11v6M14 11v6" }));
}
function DownloadIcon() {
  return h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none",
      stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
    h("path", { d: "M12 3v12" }), h("path", { d: "M7 10l5 5 5-5" }), h("path", { d: "M5 21h14" }));
}

function App() {
  var ps = useAnytypeState({ ops: [] });
  var data = ps[0], setData = ps[1];
  var cs = React.useState(PALETTE[5]); var color = cs[0], setColor = cs[1];
  var ccs = React.useState(false); var confirmClear = ccs[0], setConfirmClear = ccs[1];

  var grid = React.useMemo(function () { return buildGrid(data.ops); }, [data.ops]);

  var canvasRef = React.useRef(null);
  var gridRef = React.useRef(grid);
  var animRef = React.useRef(new Map());   // op id -> {ts, x, y, c, ripple}
  var seenRef = React.useRef(new Set());
  var introDoneRef = React.useRef(false);
  var hoverRef = React.useRef(null);
  var colorRef = React.useRef(color);
  var sideRef = React.useRef(0);
  var dprRef = React.useRef(1);
  var rafRef = React.useRef(0);
  var paintingRef = React.useRef(false);
  var lastCellRef = React.useRef("");

  React.useEffect(function () { colorRef.current = color; }, [color]);

  // ---------- drawing ----------
  function draw(now) {
    var canvas = canvasRef.current; if (!canvas) return;
    var ctx = canvas.getContext("2d");
    var dpr = dprRef.current, side = sideRef.current, cell = side / GRID;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // backdrop
    ctx.fillStyle = "#0a0b16";
    ctx.fillRect(0, 0, side, side);

    // grid lines
    ctx.strokeStyle = "rgba(255,255,255,.045)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var i = 0; i <= GRID; i++) {
      var p = Math.round(i * cell) + 0.5;
      ctx.moveTo(p, 0); ctx.lineTo(p, side);
      ctx.moveTo(0, p); ctx.lineTo(side, p);
    }
    ctx.stroke();

    var anims = animRef.current;
    var g = gridRef.current;

    // cells
    g.forEach(function (c) {
      var a = anims.get(c.id);
      var prog = 1;
      if (a) {
        if (now < a.ts) return;           // intro stagger: not visible yet
        prog = (now - a.ts) / POP_MS;
        if (prog > 1) prog = 1;
      }
      var cx = c.x * cell + cell / 2, cy = c.y * cell + cell / 2;
      var scale = prog >= 1 ? 1 : easeOutBack(prog);
      var s = cell * scale;
      ctx.globalAlpha = prog >= 1 ? 1 : Math.min(1, prog * 1.8);
      ctx.fillStyle = c.c;
      ctx.fillRect(cx - s / 2, cy - s / 2, s, s);
      ctx.globalAlpha = 1;

      // ripple ring for live placements
      if (a && a.ripple) {
        var rp = (now - a.ts) / RIPPLE_MS;
        if (rp >= 0 && rp < 1) {
          ctx.globalAlpha = (1 - rp) * 0.55;
          ctx.strokeStyle = c.c;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(cx, cy, cell * 0.45 + cell * 0.85 * rp, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    });

    // hover preview
    var hov = hoverRef.current;
    if (hov && !paintingRef.current) {
      ctx.globalAlpha = 0.5;
      if (colorRef.current == null) {
        ctx.strokeStyle = "rgba(255,255,255,.8)";
        ctx.lineWidth = 2;
        ctx.strokeRect(hov.x * cell + 2, hov.y * cell + 2, cell - 4, cell - 4);
      } else {
        ctx.fillStyle = colorRef.current;
        ctx.fillRect(hov.x * cell + 1, hov.y * cell + 1, cell - 2, cell - 2);
      }
      ctx.globalAlpha = 1;
    }
  }

  function frame() {
    var now = performance.now();
    draw(now);
    // cleanup finished anims & decide whether to keep looping
    var pending = false;
    animRef.current.forEach(function (a, id) {
      if (now > a.ts + ANIM_MAX) animRef.current.delete(id);
      else pending = true;
    });
    if (pending) { rafRef.current = requestAnimationFrame(frame); }
    else { rafRef.current = 0; }
  }
  function requestDraw() {
    if (!rafRef.current) rafRef.current = requestAnimationFrame(frame);
  }

  // ---------- keep refs in sync + schedule animations for new pixels ----------
  React.useEffect(function () {
    gridRef.current = grid;
    var now = performance.now();
    var anims = animRef.current, seen = seenRef.current;

    if (!introDoneRef.current) {
      if (grid.size > 0) {
        // first reveal: diagonal cascade
        grid.forEach(function (c) {
          if (!seen.has(c.id)) {
            anims.set(c.id, { ts: now + Math.min((c.x + c.y) * 10, 700), x: c.x, y: c.y, c: c.c, ripple: false });
            seen.add(c.id);
          }
        });
        introDoneRef.current = true;
      }
    } else {
      // live placements (local or synced from peers): pop + ripple
      grid.forEach(function (c) {
        if (!seen.has(c.id)) {
          anims.set(c.id, { ts: now, x: c.x, y: c.y, c: c.c, ripple: true });
          seen.add(c.id);
        }
      });
    }
    requestDraw();
  }, [grid]);

  // ---------- sizing ----------
  React.useEffect(function () {
    var canvas = canvasRef.current; if (!canvas) return;
    var wrap = canvas.parentElement;
    function resize() {
      var dpr = window.devicePixelRatio || 1;
      var avail = Math.min(wrap.clientWidth, wrap.clientHeight);
      var side = Math.max(120, Math.floor(avail));
      // snap so cells are integer-ish
      side = Math.floor(side / GRID) * GRID;
      dprRef.current = dpr; sideRef.current = side;
      canvas.style.width = side + "px";
      canvas.style.height = side + "px";
      canvas.width = Math.round(side * dpr);
      canvas.height = Math.round(side * dpr);
      requestDraw();
    }
    resize();
    var ro = new ResizeObserver(resize);
    ro.observe(wrap);
    return function () { ro.disconnect(); if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, []);

  // ---------- interaction ----------
  function cellFromEvent(e) {
    var canvas = canvasRef.current;
    var r = canvas.getBoundingClientRect();
    var x = clampi(Math.floor((e.clientX - r.left) / (r.width / GRID)), 0, GRID - 1);
    var y = clampi(Math.floor((e.clientY - r.top) / (r.height / GRID)), 0, GRID - 1);
    return { x: x, y: y };
  }

  function paintCell(x, y) {
    var k = keyOf(x, y);
    var existing = gridRef.current.get(k);
    var c = colorRef.current; // null = eraser
    if (c == null && !existing) return;          // nothing to erase
    if (existing && existing.c === c) return;     // already this color
    var op = { t: "set", x: x, y: y, c: c, id: Date.now() + "_" + Math.random().toString(36).slice(2) };
    setData(function (prev) { return { ops: (prev.ops || []).concat([op]) }; });
  }

  function onDown(e) {
    e.preventDefault();
    paintingRef.current = true;
    try { canvasRef.current.setPointerCapture(e.pointerId); } catch (err) {}
    var c = cellFromEvent(e);
    lastCellRef.current = keyOf(c.x, c.y);
    hoverRef.current = c;
    paintCell(c.x, c.y);
  }
  function onMove(e) {
    var c = cellFromEvent(e);
    hoverRef.current = c;
    if (paintingRef.current) {
      var k = keyOf(c.x, c.y);
      if (k !== lastCellRef.current) { lastCellRef.current = k; paintCell(c.x, c.y); }
    } else {
      requestDraw();
    }
  }
  function onUp() { paintingRef.current = false; lastCellRef.current = ""; }
  function onLeave() { hoverRef.current = null; requestDraw(); }

  function clearAll() {
    // window.confirm() is suppressed in Anytype's sandboxed iframe (no
    // 'allow-modals'); use the in-app two-step confirm (setConfirmClear) instead.
    if (!grid.size) { setConfirmClear(false); return; }
    var op = { t: "clear", id: Date.now() + "_" + Math.random().toString(36).slice(2) };
    setData(function (prev) { return { ops: (prev.ops || []).concat([op]) }; });
    setConfirmClear(false);
  }

  function exportPng() {
    var scale = 18;
    var off = document.createElement("canvas");
    off.width = GRID * scale; off.height = GRID * scale;
    var c = off.getContext("2d");
    c.fillStyle = "#0a0b16"; c.fillRect(0, 0, off.width, off.height);
    gridRef.current.forEach(function (cell) {
      c.fillStyle = cell.c;
      c.fillRect(cell.x * scale, cell.y * scale, scale, scale);
    });
    var a = document.createElement("a");
    a.href = off.toDataURL("image/png");
    a.download = "pixel-place.png";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // ---------- render ----------
  var swatches = PALETTE.map(function (col) {
    return h("div", {
      key: col, className: "swatch" + (color === col ? " sel" : ""),
      style: { background: col }, title: col,
      onClick: function () { setColor(col); }
    });
  });
  swatches.push(h("div", { key: "sep", className: "sep" }));
  swatches.push(h("div", {
    key: "eraser", className: "swatch eraser" + (color == null ? " sel" : ""),
    title: "Eraser", onClick: function () { setColor(null); }
  }, "⌫"));

  return h("div", { className: "wrap" },
    h("div", { className: "header" },
      h("div", { className: "logo" }, h("i"), h("i"), h("i"), h("i"), h("i"), h("i"), h("i"), h("i"), h("i")),
      h("div", { className: "htext" },
        h("div", { className: "title" }, "Pixel Place"),
        h("div", { className: "status" }, h("span", { className: "dot" }), "shared canvas · syncs live")
      ),
      h("div", { className: "chip" }, h("b", null, grid.size), " px"),
      h("button", { className: "icon-btn", title: "Export PNG", onClick: exportPng }, h(DownloadIcon, null)),
      (confirmClear
        ? h("button", { className: "icon-btn danger", title: "Confirm — clear for everyone", onClick: clearAll }, "✓")
        : h("button", { className: "icon-btn danger", title: "Clear canvas", onClick: function () { setConfirmClear(true); } }, h(TrashIcon, null))),
      (confirmClear
        ? h("button", { className: "icon-btn", title: "Cancel", onClick: function () { setConfirmClear(false); } }, "✕")
        : null)
    ),
    h("div", { className: "board-wrap" },
      h("canvas", {
        id: "board", ref: canvasRef,
        onPointerDown: onDown, onPointerMove: onMove,
        onPointerUp: onUp, onPointerCancel: onUp, onPointerLeave: onLeave
      })
    ),
    h("div", { className: "palette" }, swatches)
  );
}

ReactDOM.render(h(App, null), document.getElementById("app"));
</script>
