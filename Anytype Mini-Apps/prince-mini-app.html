<script src="./react.js"></script>
<script src="./react-dom.js"></script>
<script src="./useAnytypeState.js"></script>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prince of Persia</title>
<style>
  :root {
    --app-height: 720px;        /* fixed total height of the mini-app */
    --bg: #0a0712;
    --neon: #e8c170;
    --accent: #8a5a2b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    height: var(--app-height);
    background: radial-gradient(circle at 50% 0%, #25182e 0%, var(--bg) 70%);
    color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden; user-select: none;
  }
  /* Anytype embeds into #root – give it the same fixed flex layout */
  #root {
    height: var(--app-height);
    display: flex; flex-direction: column; align-items: center; overflow: hidden;
  }
  h1 {
    color: var(--neon); text-align: center; letter-spacing: 3px;
    margin: 16px 0 2px; font-size: 28px; font-weight: 800;
    text-shadow: 0 0 14px rgba(232,193,112,.4);
  }
  .sub { color: #8a7f9c; font-size: 12px; margin-bottom: 10px; }
  .stage {
    position: relative;
    background: #000; border: 3px solid var(--accent); border-radius: 14px;
    box-shadow: 0 0 0 3px #160d1c, 0 18px 50px rgba(0,0,0,.6),
                inset 0 0 40px rgba(138,90,43,.15);
    padding: 8px; flex: 1; min-height: 0;
    width: min(96vw, 880px);
    display: flex; flex-direction: column;
  }
  .frame-wrap {
    flex: 1; min-height: 0; border-radius: 8px; overflow: hidden;
    background: #000; position: relative;
  }
  iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }
  /* Fallback shown underneath the iframe – visible only if the embed is blocked */
  .fallback {
    position: absolute; inset: 0; z-index: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 24px; color: #c9bcd9;
  }
  .frame-wrap iframe { position: relative; z-index: 1; }
  .btn {
    display: inline-block; text-decoration: none;
    background: var(--accent); color: #fff; font-weight: 700;
    padding: 10px 18px; border-radius: 10px; font-size: 14px;
    border: 1px solid #a96a33;
  }
  .btn:hover { filter: brightness(1.1); }
  .controls {
    margin: 12px 0; display: flex; flex-wrap: wrap; gap: 8px 14px;
    justify-content: center; color: #aa9fbd; font-size: 13px; max-width: 520px;
  }
  .controls .k { display: inline-flex; align-items: center; gap: 6px; }
  .controls kbd {
    background: #2a1f35; border: 1px solid #4a3a57; border-bottom-width: 2px;
    border-radius: 6px; padding: 2px 7px; font-size: 12px; color: #fff;
    font-family: ui-monospace, Menlo, monospace;
  }
</style>
</head>
<body>

  <h1>PRINCE OF PERSIA</h1>
  <div class="sub">embedded from oklemenz.github.io/PrinceJS · click the game once to give it keyboard focus</div>

  <div class="stage">
    <div class="frame-wrap">
      <div class="fallback">
        <div>If the game doesn't load, the host is blocking embedding.</div>
        <a class="btn" href="https://oklemenz.github.io/PrinceJS/" target="_blank" rel="noopener">Open in a new tab ↗</a>
      </div>
      <iframe
        src="https://oklemenz.github.io/PrinceJS/"
        title="Prince of Persia (PrinceJS)"
        allow="fullscreen; gamepad; autoplay"
        referrerpolicy="no-referrer"></iframe>
    </div>
  </div>

  <div class="controls">
    <span class="k"><kbd>←</kbd><kbd>→</kbd> Run / turn</span>
    <span class="k"><kbd>↑</kbd> Jump / climb</span>
    <span class="k"><kbd>↓</kbd> Crouch / pick up</span>
    <span class="k"><kbd>Shift</kbd> Walk carefully</span>
    <span class="k"><kbd>Shift</kbd>+<kbd>←/→</kbd> Draw / fight</span>
  </div>

</body>
</html>
